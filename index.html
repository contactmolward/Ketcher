<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MolWard Sketcher Interface</title>
    <link rel="stylesheet" href="static/css/main.css">
    <style>
        body, html { margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden; }
        #ketcher-container { height: 100%; width: 100%; }
    </style>
</head>
<body>
    <div id="ketcher-container"></div>

    <script src="static/js/main.js"></script>

    <script>
        // 4. The "Bridge" logic for MolWard
        window.onload = () => {
            // This initializes the Ketcher object
            const ketcher = window.ketcher;

            // Listen for messages FROM your Wix Site
            window.addEventListener("message", (event) => {
                if (event.data === "getMolfile") {
                    // Pull the structure from the drawing board
                    ketcher.getMolfile().then((molBlock) => {
                        // Send the Molfile string BACK to Wix
                        window.parent.postMessage(molBlock, "*");
                    }).catch(err => {
                        console.error("Ketcher Error:", err);
                    });
                }
            });
        };
    </script>
</body>
</html>
