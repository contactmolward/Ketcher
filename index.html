<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MolWard Ketcher Interface</title>
    <link rel="stylesheet" href="static/css/main.css">
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100vh; 
            width: 100vw; 
            overflow: hidden; 
            background-color: #ffffff;
        }
        #ketcher-container { 
            height: 100%; 
            width: 100%; 
        }
    </style>
</head>
<body>

    <div id="ketcher-container"></div>

    <script src="static/js/main.js"></script>

    <script>

        window.onload = () => {
            console.log("MolWard Sketcher Initialized");


            window.addEventListener("message", (event) => {
                

                if (event.data === "getMolfile") {
                    

                    const ketcher = window.ketcher;

                    if (ketcher) {

                        ketcher.getMolfile().then((molBlock) => {
                            

                            window.parent.postMessage(molBlock, "*");
                            console.log("Molfile sent to Wix successfully.");
                            
                        }).catch(err => {
                            console.error("Error retrieving Molfile:", err);
                        });
                    } else {
                        console.error("Ketcher engine not found.");
                    }
                }
            });
        };
    </script>
</body>
</html>
